<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>えほんポケット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tag-active { background-color: #f97316; color: white; border-color: #f97316; }
    </style>
</head>
<body class="bg-orange-50 min-h-screen pb-20">
    <div class="max-w-md mx-auto p-4">
        <header class="text-center py-6">
            <h1 class="text-3xl font-black text-orange-600 tracking-tight">📚 えほんポケット</h1>
            <p class="text-xs text-orange-400 mt-1 font-bold">楽天ブックスえほん検索</p>
        </header>

        <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border-b-4 border-orange-200">
            <label class="block text-sm font-bold text-gray-700 mb-3">お子さまの年齢</label>
            <select id="age" class="w-full border-2 border-orange-100 p-2 rounded-xl mb-4 focus:outline-none focus:border-orange-500 transition-all text-sm">
                <option value="">指定しない</option>
                <option value="0-1">0～1歳（赤ちゃん）</option>
                <option value="2-3">2～3歳（いろいろ覚える）</option>
                <option value="4-5">4～5歳（しっかりストーリー）</option>
            </select>            
            
            <label class="block text-sm font-bold text-gray-700 mb-2">キーワードで探す</label>
            <input id="freeWord" type="text" placeholder="例：アンパンマン、消防車..." class="w-full border-2 border-orange-100 p-2 rounded-xl mb-4 focus:outline-none focus:border-orange-500 text-sm">
        
            <label class="block text-sm font-bold text-gray-700 mb-3">タグで絞り込む</label>
            <div id="tagContainer" class="flex flex-wrap gap-2 mb-5"></div>
        
            <button onclick="searchBooks()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-orange-200 hover:bg-orange-600 active:transform active:scale-95 transition-all">
                おすすめを見つける
            </button>
        </div>

        <div id="bookList" class="space-y-4">
            <div class="text-center text-gray-400 mt-10">条件を選んで「おすすめ」をタップ！</div>
        </div>
    </div>

<script>
    // ★楽天アプリID
    const RAKUTEN_APP_ID = "8420ae2b-eb02-49da-89d9-2e9c35118f94"; 

    const tags = ["おまかせ", "のりもの", "いきもの", "たべもの", "おやすみ", "わらえる", "ことば・音", "しつけ"];
    let selectedTag = "おまかせ";
    let readList = JSON.parse(localStorage.getItem('readBooks') || '[]');
    let currentBooks = [];

    const tagContainer = document.getElementById('tagContainer');
    tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.innerText = tag;
        btn.className = `px-4 py-2 rounded-full border-2 border-orange-100 text-sm font-bold transition-all ${tag === selectedTag ? 'tag-active' : 'bg-white text-orange-500'}`;
        btn.onclick = () => { selectedTag = tag; updateTagUI(); };
        tagContainer.appendChild(btn);
    });

    function updateTagUI() {
        Array.from(tagContainer.children).forEach(btn => {
            btn.className = `px-4 py-2 rounded-full border-2 border-orange-100 text-sm font-bold transition-all ${btn.innerText === selectedTag ? 'tag-active' : 'bg-white text-orange-500'}`;
        });
    }

    async function searchBooks() {
        const ageValue = document.getElementById('age').value;
        const freeWord = document.getElementById('freeWord').value;
        const listContainer = document.getElementById('bookList');
        
        // 楽天API用の年齢・タグワード変換
        let ageQuery = "";
        if (ageValue === "0-1") ageQuery = "0歳 OR 1歳 OR 赤ちゃん";
        else if (ageValue === "2-3") ageQuery = "2歳 OR 3歳 OR 幼児";
        else if (ageValue === "4-5") ageQuery = "4歳 OR 5歳 OR 児童";

        let tagQuery = "";
        if (selectedTag !== "おまかせ") {
            const tagMap = {
                "のりもの": "電車 くるま 働く車",
                "いきもの": "動物 虫 恐竜",
                "たべもの": "お菓子 料理 食べ物",
                "おやすみ": "寝かしつけ ねんね 夜",
                "わらえる": "おもしろい 笑える",
                "ことば・音": "オノマトペ リズム",
                "しつけ": "挨拶 トイレ はみがき"
            };
            tagQuery = tagMap[selectedTag] || "";
        }

        // キーワードの合体
        const fullKeyword = `${ageQuery} ${tagQuery} ${freeWord}`.trim();
        
        // 修正版：URLを安全に組み立てる
        const baseUrl = "https://app.rakuten.co.jp/services/api/BooksBook/Search/20170404";
        const url = `${baseUrl}?applicationId=${RAKUTEN_APP_ID}&title=${encodeURIComponent(fullKeyword || "絵本")}&booksGenreId=001005&sort=sales&hits=20&format=json`;

        listContainer.innerHTML = `<div class="flex justify-center py-10"><div class="animate-spin h-8 w-8 border-4 border-orange-500 rounded-full border-t-transparent"></div></div>`;
    
        try {
            // URLSearchParamsを使わず、直接文字列で叩く（こちらの方が確実な場合があります）
            const response = await fetch(url);
            const data = await response.json();
            
            // エラーの詳細をコンソールに出す（デバッグ用）
            if (data.error) {
                console.error("楽天APIエラー原因:", data.error_description);
                listContainer.innerHTML = `エラー: ${data.error_description}`;
                return;
            }

        } catch (error) {
            listContainer.innerHTML = "エラーが発生しました。ID設定を確認してね。";
        }
    }

    function renderBooks() {
        const listContainer = document.getElementById('bookList');
        listContainer.innerHTML = "";

        currentBooks.forEach(book => {
            const isRead = readList.includes(book.isbn);
            // 楽天は画像サイズが選べる (_ex=128x128 など)
            const thumbnail = book.largeImageUrl || 'https://via.placeholder.com/128x180?text=No+Image';

            const card = document.createElement('div');
            card.id = `card-${book.isbn}`;
            card.className = `bg-white p-4 rounded-2xl shadow-sm flex gap-4 border-2 transition-all ${isRead ? 'bg-green-50 border-green-200' : 'border-transparent'}`;
            card.innerHTML = `
                <img src="${thumbnail}" class="w-24 h-32 object-cover rounded-lg shadow-sm">
                <div class="flex-1 flex flex-col justify-between text-left">
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm mb-1 line-clamp-2">${book.title}</h3>
                        <p class="text-[10px] text-gray-500">${book.author}</p>
                        <p class="text-[10px] text-orange-500 font-bold mt-1">${book.itemPrice}円</p>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button onclick="toggleRead('${book.isbn}')" id="btn-${book.isbn}" class="flex-1 text-xs py-2 rounded-lg font-bold transition-all ${isRead ? 'bg-green-500 text-white' : 'bg-orange-100 text-orange-600'}">
                            ${isRead ? '✓ 読んだ' : '未読'}
                        </button>
                        <a href="${book.itemUrl}" target="_blank" class="bg-gray-100 text-gray-400 p-2 rounded-lg">
                            🛒
                        </a>
                    </div>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    function toggleRead(id) {
        readList.includes(id) ? readList = readList.filter(i => i !== id) : readList.push(id);
        localStorage.setItem('readBooks', JSON.stringify(readList));
        const card = document.getElementById(`card-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        if (readList.includes(id)) {
            card.classList.add('bg-green-50', 'border-green-200');
            btn.className = "flex-1 text-xs py-2 rounded-lg font-bold bg-green-500 text-white";
            btn.innerText = "✓ 読んだ";
        } else {
            card.classList.remove('bg-green-50', 'border-green-200');
            btn.className = "flex-1 text-xs py-2 rounded-lg font-bold bg-orange-100 text-orange-600";
            btn.innerText = "未読";
        }
    }
    
    document.getElementById('freeWord').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBooks(); });
</script>    
</body>
</html>
