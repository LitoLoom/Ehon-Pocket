<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>えほんポケット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tag-active { background-color: #f97316; color: white; border-color: #f97316; }
    </style>
</head>
<body class="bg-orange-50 min-h-screen pb-20">
    <div class="max-w-md mx-auto p-4">
        <header class="text-center py-6">
            <h1 class="text-3xl font-black text-orange-600 tracking-tight">📚 えほんポケット</h1>
            <p class="text-xs text-orange-400 mt-1 font-bold">読み聞かせ管理 & おすすめ検索</p>
        </header>

        <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border-b-4 border-orange-200">

            <label class="block text-sm font-bold text-gray-700 mb-3">お子様の年齢</label>
            <select id="age" class="w-full border-2 border-orange-100 p-2 rounded-xl mb-4 focus:outline-none focus:border-orange-500 transition-all">
                <option value="">指定しない</option>
                <option value="0-1">0～1歳（赤ちゃん）</option>
                <option value="2-3">2～3歳（いろいろ覚える）</option>
                <option value="4-5">4～5歳（しっかりストーリー）</option>
            </select>            
            <label class="block text-sm font-bold text-gray-700 mb-2">キーワードで探す</label>
            <input id="freeWord" type="text" placeholder="例：アンパンマン、消防車..." class="w-full border-2 border-orange-100 p-2 rounded-xl mb-4 focus:outline-none focus:border-orange-500 text-sm">
        
            <label class="block text-sm font-bold text-gray-700 mb-3">タグで絞り込む</label>
            <div id="tagContainer" class="flex flex-wrap gap-2 mb-5">
                <!-- JSでボタンが生成されます -->
            </div>
        
            <button onclick="searchBooks()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-orange-200 hover:bg-orange-600 active:transform active:scale-95 transition-all">
                おすすめを見つける
            </button>
        </div>
        <div id="bookList" class="space-y-4">
            <div class="text-center text-gray-400 mt-10">上の条件を選んで検索してね！</div>
        </div>
    </div>

<script>
    const tags = ["乗り物", "動物", "食べ物", "カラフル", "図鑑", "音読"];
    let selectedTag = "乗り物";
    let readList = JSON.parse(localStorage.getItem('readBooks') || '[]');

    // タグボタンの生成
    const tagContainer = document.getElementById('tagContainer');
    tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.innerText = tag;
        btn.className = `px-4 py-2 rounded-full border-2 border-orange-100 text-sm font-bold transition-all ${tag === selectedTag ? 'tag-active' : 'bg-white text-orange-500'}`;
        btn.onclick = () => {
            selectedTag = tag;
            updateTagUI();
        };
        tagContainer.appendChild(btn);
    });

    function updateTagUI() {
        Array.from(tagContainer.children).forEach(btn => {
            btn.className = `px-4 py-2 rounded-full border-2 border-orange-100 text-sm font-bold transition-all ${btn.innerText === selectedTag ? 'tag-active' : 'bg-white text-orange-500'}`;
        });
    }

    // ★重要：APIから取得したデータを一時保存する変数
    let currentBooks = [];

    async function searchBooks() {
        const ageSelect = document.getElementById('age');
        const ageValue = ageSelect.value;
        const freeWord = document.getElementById('freeWord').value;
        const listContainer = document.getElementById('bookList');
        
        // 1. 年齢キーワード（もっともヒットしやすい日本語の羅列にする）
        let ageQuery = "";
        if (ageValue === "0-1") {
            ageQuery = "(0歳 OR 1歳 OR 赤ちゃん OR 0-year-old)";
        } else if (ageValue === "2-3") {
            ageQuery = "(2歳 OR 3歳 OR 幼児 OR 2-year-old)";
        } else if (ageValue === "4-5") {
            ageQuery = "(4歳 OR 5歳 OR 児童 OR 4-year-old)";
        }
    
        // 2. タグ（もっとも一般的な言葉に変換）
        let categoryQuery = selectedTag;
        if(selectedTag === "音読") categoryQuery = "オノマトペ";
        if(selectedTag === "カラフル") categoryQuery = "絵";
        
        // 3. 【最重要】クエリの組み立て
        // 「intitle:」を復活させますが、キーワードを絞ります
        // 「subject:juvenile fiction」を付けることで大人向けを強制排除します
        let searchTerms = `intitle:絵本 ${ageQuery} ${categoryQuery} ${freeWord}`;
        
        const query = encodeURIComponent(searchTerms);
        // q= の後にジャンル指定を合体させる
        const apiUrl = `https://www.googleapis.com/books/v1/volumes?q=${query}+subject:juvenile+fiction&maxResults=20&printType=books&langRestrict=ja`;
            
        listContainer.innerHTML = `<div class="flex justify-center py-10"><div class="animate-spin h-8 w-8 border-4 border-orange-500 rounded-full border-t-transparent"></div></div>`;
    
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            console.log("検索中のURL:", apiUrl);
            console.log("検索ワード明細:", searchTerms);
            
            if (!data.items || data.items.length === 0) {
                listContainer.innerHTML = `<div class="text-center text-gray-500 py-10">
                    本が見つかりませんでした。<br>
                    <span class="text-xs">「指定しない」にしたり、言葉を短くしてみてね。</span>
                </div>`;
                return;
            }
    
            // ページ数によるフィルタリング（150ページ以上に少し緩めます）
            currentBooks = data.items.filter(book => {
                const pc = book.volumeInfo.pageCount;
                return !pc || pc < 150; 
            });
    
            renderBooks();
    
        } catch (error) {
            listContainer.innerHTML = "エラーが発生しました。時間を置いて試してね。";
        }
    }

    // 描画だけを担当する関数（APIを叩かない）
    function renderBooks() {
        const listContainer = document.getElementById('bookList');
        listContainer.innerHTML = "";

        currentBooks.forEach(book => {
            const info = book.volumeInfo;
            const bookId = book.id;
            const isRead = readList.includes(bookId);
            const thumbnail = info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : 'https://via.placeholder.com/128x180?text=No+Image';

            const card = document.createElement('div');
            // IDを付与しておくと後で個別に操作しやすい
            card.id = `card-${bookId}`;
            card.className = `bg-white p-4 rounded-2xl shadow-sm flex gap-4 border-2 ${isRead ? 'bg-green-50 border-green-200' : 'border-transparent'}`;
            card.innerHTML = `
                <img src="${thumbnail}" class="w-24 h-32 object-cover rounded-lg shadow-sm">
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-gray-800 text-base mb-1">${info.title}</h3>
                        <p class="text-xs text-gray-500">${info.authors ? info.authors[0] : '不明'}</p>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button onclick="toggleRead('${bookId}')" id="btn-${bookId}" class="flex-1 text-xs py-2 rounded-lg font-bold transition-all ${isRead ? 'bg-green-500 text-white' : 'bg-orange-100 text-orange-600'}">
                            ${isRead ? '✓ 読んだ' : '未読'}
                        </button>
                    </div>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    function toggleRead(id) {
        // 保存処理
        if (readList.includes(id)) {
            readList = readList.filter(item => item !== id);
        } else {
            readList.push(id);
        }
        localStorage.setItem('readBooks', JSON.stringify(readList));

        // ★重要：APIを叩かずに、見た目だけを切り替える
        const card = document.getElementById(`card-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        
        if (readList.includes(id)) {
            card.classList.add('bg-green-50', 'border-green-200');
            btn.className = "flex-1 text-xs py-2 rounded-lg font-bold bg-green-500 text-white";
            btn.innerText = "✓ 読んだ";
        } else {
            card.classList.remove('bg-green-50', 'border-green-200');
            btn.className = "flex-1 text-xs py-2 rounded-lg font-bold bg-orange-100 text-orange-600";
            btn.innerText = "未読";
        }
    }
</script>    

</body>
</html>
